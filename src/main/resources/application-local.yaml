spring:
  config:
    import: optional:file:./env.properties

  datasource:
    url: ${LOCAL_DATA_SOURCE:jdbc:postgresql://localhost:6000/salesforce_local}
    username: ${LOCAL_DATASOURCE_USERNAME:sf_user}
    password: ${LOCAL_DATASOURCE_PASSWORD:sf_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost}:${KAFKA_SERVER_PORT:9092}
    consumer:
      group-id: leads-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual